defaults:
  - _self_

# Complete self-contained configuration for grid search
# Data configuration
data:
  data_path: '../data/final_data/FINAL_diagnostics_CAT1.parquet'

# Model configuration (base defaults that will be overridden by sweep parameters)
model:
  target_code: "Chapter10#J00-J99"
  lookback: 7
  forecast: 7
  num_transformer_blocks: 2
  head_size: 16
  num_heads: 16
  activation: 'leaky_relu'
  covid_token: false
  ff_dim: 128
  mlp_units: 128
  dropout: 0.5
  learning_rate: 1e-5
  

# Training configuration
training:
  cutoff_date: "2008-01-01"  # Fixed: Use a date that ensures sufficient training data
  positional_encoding: false
  covid_token: true, false
  evaluate_model: true

# System configuration  
system:
  backend: "Agg"

# MLflow configuration
mlflow:
  tracking_uri: "file:./mlruns"
  experiment_name: "TRANSFORMERS_PREDAP_HYDRA_GRID_SEARCH"

# Hydra multirun configuration
hydra:
  sweep:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  sweeper:
    params:
      # Target codes to evaluate
      model.target_code: total, "Chapter10#J00-J99", "Ch10#subch01#J00-J06", J00, "Chapter18#R00-R99", M54
      
      # Temporal parameters - lookback and forecast horizons
      model.lookback: 7,14,30,60
      model.forecast: 7,14,30,60
      
      # Model architecture parameters
      model.num_transformer_blocks: 2,4
      model.head_size: 32
      model.num_heads: 4,8
      model.ff_dim: 512
      model.mlp_units: 512
      
      # Training hyperparameters
      model.activation: tanh
      model.covid_token: true
      model.dropout: 0.25
      model.learning_rate: 0.000001
     
      
      # Optional: Add training configuration parameters to grid search
      # training.cutoff_date: "2022-01-01","2021-01-01"
      # training.positional_encoding: true,false
      


