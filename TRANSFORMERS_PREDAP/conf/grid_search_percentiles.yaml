defaults:
  - _self_

# Complete self-contained configuration for grid search
# Data configuration
data:
  data_path: "src/data/longitudinalitat_DIAGNOSTICS_GROUPED_timestamp.csv"

# Model configuration (base defaults that will be overridden by sweep parameters)
model:
  target_code: "T14"
  lookback: 7
  forecast: 7
  num_transformer_blocks: 2
  head_size: 2
  num_heads: 2
  activation: "tanh"
  covid_token: false
  ff_dim: 8
  mlp_units: 32
  dropout: 0.1
  learning_rate: 0.00001
  

# Training configuration
training:
  cutoff_date: "2008-01-01"  # Fixed: Use a date that ensures sufficient training data
  positional_encoding: false
  evaluate_model: true

# System configuration  
system:
  backend: "Agg"

# MLflow configuration
mlflow:
  tracking_uri: "file:./mlruns"
  experiment_name: "TRANSFORMERS_PREDAP_HYDRA_GRID_SEARCH"

# Hydra multirun configuration
hydra:
  sweep:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  sweeper:
    params:
      # Target codes to evaluate
      #Diagnostic codes in the 10th percentile: ['Z14']
      #Diagnostic codes in the 25th percentile: ['O40']
      #Diagnostic codes in the 50th percentile: ['F70']
      #Diagnostic codes in the 75th percentile: ['R82']
      #Diagnostic codes in the 90th percentile: ['L82']
      
      model.target_code: Z14,O40,F70,R82,L82
      
      # Temporal parameters - lookback and forecast horizons
      model.lookback: 1,7,14,30,60,182,365
      model.forecast: 1,7,14,30,60,182,365
      
      # Model architecture parameters
      model.num_transformer_blocks: 4
      model.head_size: 4
      model.num_heads: 4
      model.ff_dim: 32
      model.mlp_units: 64
      
      # Training hyperparameters
      model.activation: tanh
      model.covid_token: false
      model.dropout: 0.5
      model.learning_rate: 0.00001
     
      
      # Optional: Add training configuration parameters to grid search
      # training.cutoff_date: "2022-01-01","2021-01-01"
      # training.positional_encoding: true,false
      