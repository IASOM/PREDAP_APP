# MkDocs configuration for CCLR_PREDAP
site_name: CCLR-PREDAP Documentation
site_description: Comprehensive Cross-Correlation and Lagged Linear Regression for Predictive Analytics
site_author: Guillem Hernández Guillamet
site_url: https://your-organization.github.io/CCLR_PREDAP

# Repository
repo_name: CCLR_PREDAP
repo_url: https://github.com/your-organization/CCLR_PREDAP

# Copyright
copyright: Copyright &copy; 2025 Guillem Hernández Guillamet

# Configuration
theme:
  name: material
  palette:
    # Palette toggle for light mode
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate

# Extensions
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.mark
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.tilde
  - attr_list
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

# Plugins
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_toc_entry: false

# Page tree
nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - Configuration: getting-started/configuration.md
  - API Reference:
    - LMLR Module: api/lmlr.md
    - Granger Causality Module: api/gcausal.md
    - Deep Learning Module: api/dl.md

# Extra
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/your-organization/CCLR_PREDAP
    - icon: fontawesome/solid/paper-plane
      link: mailto:guillemhg98@gmail.com

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js