defaults:
  - _self_

# Data configuration (points to AQUAS_DATA_RETRIEVAL output)
data:
  data_path: "AQUAS_DATA_RETRIEVAL/AQUAS_DATA_RETRIEVAL-main/data/finals/demand_diagnosis_joined.parquet"

# Model configuration  
model:
  target_code: "T14"
  lookback: 7
  forecast: 7
  num_transformer_blocks: 2
  head_size: 2
  num_heads: 2
  activation: "tanh"
  covid_token: false
  ff_dim: 8
  mlp_units: 32
  dropout: 0.1
  learning_rate: 0.001

# Training configuration
training:
  cutoff_date: "2010-01-01"
  positional_encoding: false
  evaluate_model: true

# System configuration
system:
  backend: "Agg"
  
# MLflow configuration
mlflow:
  tracking_uri: "file:./mlruns"
  experiment_name: "TRANSFORMERS_PREDAP_HYDRA"